```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patel Dairy Enterprise</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

.container{
padding:15px;
max-width:1200px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
margin-bottom:15px;
backdrop-filter:blur(10px);
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
background:#00ffcc;
color:black;
font-weight:bold;
cursor:pointer;
}

.hidden{
display:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid white;
padding:6px;
text-align:center;
}

.actionBtn{
width:auto;
padding:5px 10px;
margin:2px;
}

</style>
</head>

<body>

<div class="container">

<div id="auth">

<div class="card">
<h2>Signup</h2>
<input id="suUser" placeholder="Username">
<input id="suPass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<div class="card">
<h2>Login</h2>
<input id="liUser" placeholder="Username">
<input id="liPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

</div>


<div id="app" class="hidden">

<div class="card">
<h2>Dashboard</h2>
<p id="summary"></p>
<button onclick="logout()">Logout</button>
</div>

<!-- CUSTOMER -->

<div class="card">

<h2>Customers</h2>

<input id="searchCustomer" placeholder="Search Customer" onkeyup="searchCustomer()">

<input id="custName" placeholder="Customer Name">

<input id="milkPrice" placeholder="Price per Litre">

<button onclick="addCustomer()">Add Customer</button>

<div id="customerList"></div>

</div>

<!-- ENTRY -->

<div class="card">

<h2>Daily Milk Entry</h2>

<select id="custSelect"></select>

<input type="date" id="entryDate">

<input id="entryMilk" placeholder="Milk Litres">

<button onclick="addEntry()">Add Entry</button>

<h3>Filter Entries</h3>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<button onclick="filterEntries()">Filter</button>

<div id="entryList"></div>

</div>

<!-- REPORT -->

<div class="card">

<h2>Customer Monthly Report</h2>

<select id="reportCustomer"></select>

<input type="month" id="reportMonth">

<button onclick="generateMonthlyReport()">Generate</button>

<div id="monthlyReport"></div>

</div>

<!-- PRODUCTION -->

<div class="card">

<h2>Production</h2>

<input type="date" id="prodDate">

<input id="morningMilk" placeholder="Morning Milk">

<input id="eveningMilk" placeholder="Evening Milk">

<button onclick="addProduction()">Add Production</button>

<div id="productionList"></div>

</div>

<!-- COW -->

<div class="card">

<h2>Cow Tracking</h2>

<input id="cowName" placeholder="Cow Name">

<button onclick="addCow()">Add Cow</button>

<div id="cowList"></div>

</div>

<!-- FEED -->

<div class="card">

<h2>Feed Cost</h2>

<input id="feedCost">

<button onclick="saveFeed()">Save Feed Cost</button>

</div>

<!-- EXPENSE -->

<div class="card">

<h2>Daily Expense</h2>

<input type="date" id="expDate">

<input id="expNote" placeholder="Expense Note">

<input id="expAmount" placeholder="Amount">

<button onclick="addExpense()">Add Expense</button>

<div id="expenseList"></div>

</div>

<!-- MONTHLY EXPENSE -->

<div class="card">

<h2>Monthly Expense Report</h2>

<input type="month" id="expMonth">

<button onclick="generateExpenseReport()">Generate</button>

<div id="expenseReport"></div>

</div>

<!-- GRAPH -->

<div class="card">

<h2>Production Graph</h2>

<canvas id="chart"></canvas>

</div>

<!-- BACKUP -->

<div class="card">

<h2>Backup / Restore</h2>

<button onclick="backup()">Download Backup</button>

<input type="file" onchange="restore(event)">

</div>

</div>

</div>

<script>

let currentUser=null;

let customers=[];
let entries=[];
let production=[];
let cows=[];
let expenses=[];
let feed=0;

let chartInstance=null;

function getKey(k){
return currentUser+"_"+k
}

function signup(){
localStorage.setItem("user_"+suUser.value,suPass.value);
alert("Signup success");
}

function login(){

if(localStorage.getItem("user_"+liUser.value)===liPass.value){

currentUser=liUser.value;

auth.classList.add("hidden");
app.classList.remove("hidden");

loadAll();

}

else{
alert("Wrong login");
}

}

function logout(){
location.reload();
}

function loadAll(){

customers=JSON.parse(localStorage.getItem(getKey("customers")))||[];
entries=JSON.parse(localStorage.getItem(getKey("entries")))||[];
production=JSON.parse(localStorage.getItem(getKey("production")))||[];
cows=JSON.parse(localStorage.getItem(getKey("cows")))||[];
expenses=JSON.parse(localStorage.getItem(getKey("expenses")))||[];
feed=parseFloat(localStorage.getItem(getKey("feed")))||0;

renderCustomers();
renderEntries();
renderProduction();
renderCows();
renderExpenses();

refreshSelect();
refreshReportCustomer();

loadSummary();
drawChart();

}

function saveAll(){

localStorage.setItem(getKey("customers"),JSON.stringify(customers));
localStorage.setItem(getKey("entries"),JSON.stringify(entries));
localStorage.setItem(getKey("production"),JSON.stringify(production));
localStorage.setItem(getKey("cows"),JSON.stringify(cows));
localStorage.setItem(getKey("expenses"),JSON.stringify(expenses));
localStorage.setItem(getKey("feed"),feed);

}

function addCustomer(){

customers.push({
name:custName.value,
price:parseFloat(milkPrice.value)
});

saveAll();
renderCustomers();
refreshSelect();
refreshReportCustomer();

}

function renderCustomers(){

let html="<table><tr><th>Name</th><th>Price</th><th>Action</th></tr>";

customers.forEach((c,i)=>{

html+=`<tr>
<td>${c.name}</td>
<td>${c.price}</td>
<td>
<button class="actionBtn" onclick="deleteCustomer(${i})">Delete</button>
</td>
</tr>`;

});

html+="</table>";

customerList.innerHTML=html;

}

function deleteCustomer(i){
customers.splice(i,1);
saveAll();
renderCustomers();
}

function refreshSelect(){

custSelect.innerHTML="";

customers.forEach((c,i)=>{
custSelect.innerHTML+=`<option value="${i}">${c.name}</option>`;
});

}

function refreshReportCustomer(){

reportCustomer.innerHTML="";

customers.forEach(c=>{
reportCustomer.innerHTML+=`<option>${c.name}</option>`;
});

}

function addEntry(){

let c=customers[custSelect.value];
let total=entryMilk.value*c.price;

entries.push({
date:entryDate.value,
name:c.name,
litre:entryMilk.value,
total
});

saveAll();
renderEntries();
loadSummary();

}

function renderEntries(){

let html="<table><tr><th>Date</th><th>Name</th><th>Litre</th><th>Total</th><th>Action</th></tr>";

entries.forEach((e,i)=>{

html+=`<tr>
<td>${e.date}</td>
<td>${e.name}</td>
<td>${e.litre}</td>
<td>${e.total}</td>
<td>
<button onclick="deleteEntry(${i})">Delete</button>
</td>
</tr>`;

});

html+="</table>";

entryList.innerHTML=html;

}

function deleteEntry(i){

entries.splice(i,1);

saveAll();

renderEntries();

loadSummary();

}

function generateMonthlyReport(){

let customer=reportCustomer.value;
let month=reportMonth.value;

let filtered=entries.filter(e=>e.name===customer && e.date.startsWith(month));

let milk=filtered.reduce((s,e)=>s+parseFloat(e.litre),0);
let money=filtered.reduce((s,e)=>s+parseFloat(e.total),0);

monthlyReport.innerHTML="Milk: "+milk+"L<br>Bill: ₹"+money;

}

function addProduction(){

let total=parseFloat(morningMilk.value||0)+parseFloat(eveningMilk.value||0);

production.push({date:prodDate.value,total});

saveAll();
renderProduction();
drawChart();

}

function renderProduction(){

let html="<table><tr><th>Date</th><th>Total</th><th>Action</th></tr>";

production.forEach((p,i)=>{

html+=`<tr>
<td>${p.date}</td>
<td>${p.total}</td>
<td>
<button onclick="deleteProduction(${i})">Delete</button>
</td>
</tr>`;

});

html+="</table>";

productionList.innerHTML=html;

}

function deleteProduction(i){

production.splice(i,1);

saveAll();

renderProduction();

drawChart();

}

function addCow(){

cows.push(cowName.value);

saveAll();

renderCows();

}

function renderCows(){

let html="<table>";

cows.forEach(c=>{
html+=`<tr><td>${c}</td></tr>`;
});

html+="</table>";

cowList.innerHTML=html;

}

function saveFeed(){

feed=parseFloat(feedCost.value);

saveAll();

loadSummary();

}

function addExpense(){

expenses.push({
date:expDate.value,
note:expNote.value,
amount:parseFloat(expAmount.value)
});

saveAll();

renderExpenses();

}

function renderExpenses(){

let html="<table><tr><th>Date</th><th>Note</th><th>Amount</th><th>Action</th></tr>";

expenses.forEach((e,i)=>{

html+=`<tr>
<td>${e.date}</td>
<td>${e.note}</td>
<td>${e.amount}</td>
<td>
<button onclick="deleteExpense(${i})">Delete</button>
</td>
</tr>`;

});

html+="</table>";

expenseList.innerHTML=html;

}

function deleteExpense(i){

expenses.splice(i,1);

saveAll();

renderExpenses();

loadSummary();

}

function generateExpenseReport(){

let month=expMonth.value;

let filtered=expenses.filter(e=>e.date.startsWith(month));

let total=filtered.reduce((s,e)=>s+e.amount,0);

expenseReport.innerHTML="Total Expense ₹"+total;

}

function loadSummary(){

let milk=entries.reduce((s,e)=>s+parseFloat(e.litre),0);
let income=entries.reduce((s,e)=>s+parseFloat(e.total),0);
let prod=production.reduce((s,p)=>s+p.total,0);
let expense=expenses.reduce((s,e)=>s+e.amount,0);

let profit=income-feed-expense;

summary.innerHTML=

"Milk Sold: "+milk+"L<br>"+
"Income: ₹"+income+"<br>"+
"Production: "+prod+"L<br>"+
"Expense: ₹"+expense+"<br>"+
"Profit: ₹"+profit;

}

function drawChart(){

if(chartInstance) chartInstance.destroy();

chartInstance=new Chart(chart,{

type:"line",

data:{
labels:production.map(p=>p.date),
datasets:[{
label:"Production",
data:production.map(p=>p.total),
borderColor:"lime"
}]
}

});

}

function backup(){

let data={customers,entries,production,cows,expenses,feed};

let blob=new Blob([JSON.stringify(data)],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="backup.json";

a.click();

}

function restore(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(){

let data=JSON.parse(reader.result);

customers=data.customers;
entries=data.entries;
production=data.production;
cows=data.cows;
expenses=data.expenses;
feed=data.feed;

saveAll();
loadAll();

alert("Restore complete");

};

reader.readAsText(file);

}

</script>

</body>
</html>
```
